name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements-dev.txt
      - run: ./scripts/validate-codex.sh
      - run: ./scripts/docs-check.sh
      - run: ./scripts/migration-check.sh
      - run: ./scripts/roadmap-sync-check.sh
      - run: ./scripts/compact-check.sh
